<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ロンドン出張 家族タスク</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #f0f4f8;
            color: #334155;
            padding-bottom: 40px;
        }
        .task-card {
            transition: all 0.2s ease;
        }
        .task-card:active {
            transform: scale(0.98);
        }
        .task-done .task-label {
            text-decoration: line-through;
            color: #94a3b8;
        }
        .task-done .task-icon {
            opacity: 0.4;
        }
        .custom-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            position: relative;
        }
        .custom-checkbox:checked {
            background-color: #22c55e;
            border-color: #22c55e;
        }
        .custom-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 6px;
            height: 10px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }
        .progress-bar {
            transition: width 0.4s ease;
        }
        .badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 700;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- ヘッダー -->
<div class="bg-gradient-to-br from-blue-900 via-blue-800 to-indigo-900 text-white px-4 pt-10 pb-8">
    <div class="max-w-lg mx-auto">
        <div class="flex items-center gap-3 mb-1">
            <span class="text-4xl">🇬🇧</span>
            <div>
                <p class="text-blue-200 text-sm font-medium tracking-widest uppercase">London Business Trip</p>
                <h1 class="text-2xl font-bold">家族タスクリスト</h1>
            </div>
        </div>
        <p class="text-blue-300 text-sm mt-3 ml-1">家族からのお願いをまとめたよ。全部やってきてね！</p>

        <!-- 進捗バー -->
        <div class="mt-5 bg-blue-950/50 rounded-full h-3 overflow-hidden">
            <div id="progressBar" class="progress-bar bg-gradient-to-r from-green-400 to-emerald-500 h-3 rounded-full" style="width: 0%"></div>
        </div>
        <div class="flex justify-between mt-1">
            <p class="text-blue-300 text-xs" id="progressText">0 / 0 完了</p>
            <p class="text-blue-300 text-xs" id="progressPercent">0%</p>
        </div>
    </div>
</div>

<div class="max-w-lg mx-auto px-4 mt-6 space-y-5">

    <!-- 行くべきスポット -->
    <section class="fade-in">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">📍</span>
            <h2 class="font-bold text-slate-700 text-base">行くべきスポット</h2>
        </div>

        <!-- グリニッジ天文台 -->
        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-0">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this, 'card-0')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🔭</span>
                        <span class="task-label font-bold text-slate-800">グリニッジ天文台</span>
                        <span class="badge bg-amber-100 text-amber-700">観光</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">Blackheath Ave, London SE10 8XJ</p>
                    <a href="https://maps.app.goo.gl/r8gDTJZxHvZNcRR98" target="_blank"
                       class="inline-flex items-center gap-1 mt-2 text-blue-600 text-xs font-medium hover:underline"
                       onclick="event.stopPropagation()">
                        <i class="fa-solid fa-map-location-dot"></i> Google Maps で開く
                    </a>
                </div>
            </label>
        </div>

        <!-- グリニッジマーケット -->
        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-1">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this, 'card-1')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🛒</span>
                        <span class="task-label font-bold text-slate-800">グリニッジマーケット</span>
                        <span class="badge bg-green-100 text-green-700">マーケット</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">地元民おすすめ！絶対行くべし</p>
                    <a href="https://maps.app.goo.gl/sjfnMD7MsdWWvdyD9" target="_blank"
                       class="inline-flex items-center gap-1 mt-2 text-blue-600 text-xs font-medium hover:underline"
                       onclick="event.stopPropagation()">
                        <i class="fa-solid fa-map-location-dot"></i> Google Maps で開く
                    </a>
                </div>
            </label>
        </div>

        <!-- 老舗デパート -->
        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-2">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this, 'card-2')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🏬</span>
                        <span class="task-label font-bold text-slate-800">ホテル近くの老舗デパート</span>
                        <span class="badge bg-purple-100 text-purple-700">ショッピング</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">ジョン・ルイス。下のお買い物リストもここで揃うよ</p>
                    <a href="https://maps.app.goo.gl/mRBF28pzXVCH7fhX9" target="_blank"
                       class="inline-flex items-center gap-1 mt-2 text-blue-600 text-xs font-medium hover:underline"
                       onclick="event.stopPropagation()">
                        <i class="fa-solid fa-map-location-dot"></i> Google Maps で開く
                    </a>
                </div>
            </label>
        </div>
    </section>

    <!-- サエカエへ -->
    <section class="fade-in">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">👜</span>
            <h2 class="font-bold text-slate-700 text-base">サエカエへ</h2>
        </div>

        <!-- ヴィヴィアン バッグチャーム -->
        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-3">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this, 'card-3')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🐻</span>
                        <span class="task-label font-bold text-slate-800">ヴィヴィアン テディベア バッグチャーム</span>
                        <span class="badge bg-pink-100 text-pink-700">John Lewis</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">Vivienne Westwood Teddy Bear Handbag Charm・Multi</p>
                    <a href="https://www.johnlewis.com/vivienne-westwood-teddy-bear-handbag-charm-multi/p114158120" target="_blank"
                       class="inline-flex items-center gap-1 mt-2 text-blue-600 text-xs font-medium hover:underline"
                       onclick="event.stopPropagation()">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> 商品ページを見る
                    </a>
                </div>
            </label>
        </div>

        <!-- 腕時計 -->
        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-4">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this, 'card-4')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">⌚</span>
                        <span class="task-label font-bold text-slate-800">腕時計（予算が許せば）</span>
                        <span class="badge bg-slate-100 text-slate-600">任意</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">サエカエへ。バッグチャームとあわせて検討して！</p>
                </div>
            </label>
        </div>
    </section>

    <!-- ぴぴへ -->
    <section class="fade-in">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">👗</span>
            <h2 class="font-bold text-slate-700 text-base">ぴぴへ</h2>
        </div>

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-5">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this, 'card-5')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🌊</span>
                        <span class="task-label font-bold text-slate-800">ウェーブストライプ ニットワンピース</span>
                        <span class="badge bg-pink-100 text-pink-700">John Lewis</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">John Lewis Kids Wavy Stripe Knit Dress・Multi<br>ぴぴに似合いそう！</p>
                    <a href="https://www.johnlewis.com/john-lewis-kids-wavy-stripe-knit-dress-multi/p114464209" target="_blank"
                       class="inline-flex items-center gap-1 mt-2 text-blue-600 text-xs font-medium hover:underline"
                       onclick="event.stopPropagation()">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> 商品ページを見る
                    </a>
                </div>
            </label>
        </div>
    </section>

    <!-- 紗英へ -->
    <section class="fade-in">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">👕</span>
            <h2 class="font-bold text-slate-700 text-base">紗英へ</h2>
        </div>

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-6">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this, 'card-6')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🩵</span>
                        <span class="task-label font-bold text-slate-800">タイサイドTシャツ（アクア）</span>
                        <span class="badge bg-cyan-100 text-cyan-700">Mango Kids</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">Mango Kids Textured Short Sleeve Tie Side T-Shirt・Aqua<br>紗英がギリ着てくれそうな女の子っぽいTシャツ</p>
                    <a href="https://www.johnlewis.com/mango-kids-textured-short-sleeve-tie-side-t-shirt-aqua/p115117304" target="_blank"
                       class="inline-flex items-center gap-1 mt-2 text-blue-600 text-xs font-medium hover:underline"
                       onclick="event.stopPropagation()">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> 商品ページを見る
                    </a>
                </div>
            </label>
        </div>
    </section>

    <!-- 自分用メモ -->
    <section class="fade-in">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">💍</span>
            <h2 class="font-bold text-slate-700 text-base">ついでにチェック</h2>
        </div>

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-7">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this, 'card-7')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🪙</span>
                        <span class="task-label font-bold text-slate-800">シルバーリング</span>
                        <span class="badge bg-slate-100 text-slate-600">Autumn &amp; May</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">Fiorelli Layered Two Tone Octagon Sterling Silver Ring<br>ちょいちょいかわいいなぁと思ってるやつ</p>
                    <a href="https://www.autumnandmay.co.uk/product/fiorelli-layered-two-tone-octagon-sterling-silver-ring/" target="_blank"
                       class="inline-flex items-center gap-1 mt-2 text-blue-600 text-xs font-medium hover:underline"
                       onclick="event.stopPropagation()">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> 商品ページを見る
                    </a>
                </div>
            </label>
        </div>
    </section>

    <!-- 全完了メッセージ -->
    <div id="allDoneMsg" class="hidden text-center py-8">
        <div class="text-5xl mb-3">🎉</div>
        <p class="font-bold text-slate-700 text-lg">全部クリア！</p>
        <p class="text-slate-500 text-sm mt-1">お疲れさまでした。家族が喜ぶといいね！</p>
    </div>

</div>

<script>
    const TOTAL = 8;

    function updateProgress() {
        const checked = document.querySelectorAll('.custom-checkbox:checked').length;
        const pct = Math.round((checked / TOTAL) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = checked + ' / ' + TOTAL + ' 完了';
        document.getElementById('progressPercent').textContent = pct + '%';
        document.getElementById('allDoneMsg').classList.toggle('hidden', checked < TOTAL);
    }

    function toggleTask(checkbox, cardId) {
        const card = document.getElementById(cardId);
        if (checkbox.checked) {
            card.classList.add('task-done');
            card.style.opacity = '0.65';
        } else {
            card.classList.remove('task-done');
            card.style.opacity = '1';
        }
        updateProgress();
        saveState();
    }

    function saveState() {
        const states = {};
        document.querySelectorAll('.custom-checkbox').forEach((cb, i) => {
            states[i] = cb.checked;
        });
        try { localStorage.setItem('london_tasks', JSON.stringify(states)); } catch(e) {}
    }

    function loadState() {
        try {
            const states = JSON.parse(localStorage.getItem('london_tasks') || '{}');
            document.querySelectorAll('.custom-checkbox').forEach((cb, i) => {
                if (states[i]) {
                    cb.checked = true;
                    const cardId = 'card-' + i;
                    const card = document.getElementById(cardId);
                    if (card) {
                        card.classList.add('task-done');
                        card.style.opacity = '0.65';
                    }
                }
            });
        } catch(e) {}
        updateProgress();
    }

    loadState();
</script>

</body>
</html>
