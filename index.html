<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ロンドン出張 家族タスク</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #f0f4f8;
            color: #334155;
            padding-bottom: 88px;
        }
        .task-card { transition: all 0.2s ease; }
        .task-card:active { transform: scale(0.98); }
        .task-done .task-label { text-decoration: line-through; color: #94a3b8; }
        .task-done .task-icon { opacity: 0.4; }
        .task-done .price-tag { opacity: 0.4; }
        .custom-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 26px; height: 26px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            position: relative;
        }
        .custom-checkbox:checked { background-color: #22c55e; border-color: #22c55e; }
        .custom-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 6px; top: 2px;
            width: 6px; height: 11px;
            border: 2.5px solid white;
            border-top: none; border-left: none;
            transform: rotate(45deg);
        }
        .progress-bar { transition: width 0.4s ease; }
        .badge {
            display: inline-block;
            font-size: 11px; padding: 2px 8px;
            border-radius: 999px; font-weight: 700;
        }
        .price-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 4px 10px;
            background: #fefce8;
            border: 1px solid #fde68a;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #92400e;
        }
        .price-tag .jpy { color: #b45309; font-size: 12px; }
        .link-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .link-btn {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; font-weight: 600;
            padding: 4px 10px; border-radius: 8px;
            text-decoration: none; transition: opacity 0.15s;
        }
        .link-btn:active { opacity: 0.7; }
        .link-btn-shop { background: #eff6ff; color: #2563eb; }
        .link-btn-map  { background: #f0fdf4; color: #16a34a; }
        /* 合計バー */
        #totalBar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(135deg, #1e3a5f, #1e40af);
            color: white;
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
            z-index: 50;
        }
        #totalBar.hidden-bar { transform: translateY(100%); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-left: 4px; }
        .section-header h2 { font-weight: 700; color: #475569; font-size: 15px; }
    </style>
</head>
<body>

<!-- ヘッダー -->
<div class="bg-gradient-to-br from-blue-900 via-blue-800 to-indigo-900 text-white px-4 pt-10 pb-8">
    <div class="max-w-lg mx-auto">
        <div class="flex items-center gap-3 mb-1">
            <span class="text-4xl">🇬🇧</span>
            <div>
                <p class="text-blue-200 text-sm font-medium tracking-widest uppercase">London Business Trip</p>
                <h1 class="text-2xl font-bold">家族タスクリスト</h1>
            </div>
        </div>
        <p class="text-blue-300 text-sm mt-2 ml-1">家族からのお願いをまとめたよ。全部やってきてね！</p>
        <div class="mt-5 bg-blue-950/50 rounded-full h-3 overflow-hidden">
            <div id="progressBar" class="progress-bar bg-gradient-to-r from-green-400 to-emerald-500 h-3 rounded-full" style="width: 0%"></div>
        </div>
        <div class="flex justify-between mt-1">
            <p class="text-blue-300 text-xs" id="progressText">0 / 8 完了</p>
            <p class="text-blue-300 text-xs" id="progressPercent">0%</p>
        </div>
    </div>
</div>

<div class="max-w-lg mx-auto px-4 mt-6 space-y-6">

    <!-- ======= 行くべきスポット ======= -->

                        <span class="badge bg-amber-100 text-amber-700">観光</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">Blackheath Ave, London SE10 8XJ</p>
                    <div class="link-row">
                        <a href="https://maps.app.goo.gl/r8gDTJZxHvZNcRR98" target="_blank" class="link-btn link-btn-map" onclick="event.stopPropagation()">
                            <i class="fa-solid fa-map-location-dot"></i> Google Maps
                        </a>
                    </div>
                </div>
            </label>
        </div>

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-1">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this,'card-1')">

                        <span class="task-icon text-xl">🛒</span>

                    </div>

                    <div class="link-row">

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-2">

                    <div class="link-row">
                        <a href="https://maps.app.goo.gl/mRBF28pzXVCH7fhX9" target="_blank" class="link-btn link-btn-map" onclick="event.stopPropagation()">

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-3">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this,'card-3')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🐻</span>
                        <span class="task-label font-bold text-slate-800">ヴィヴィアン テディベア バッグチャーム</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">Vivienne Westwood Teddy Bear Handbag Charm・Multi</p>
                    <div class="price-tag">
                        <span>£170.00</span>

                    <div class="link-row">
                        <a href="https://www.johnlewis.com/vivienne-westwood-teddy-bear-handbag-charm-multi/p114158120" target="_blank" class="link-btn link-btn-shop" onclick="event.stopPropagation()">

                            <i class="fa-solid fa-map-location-dot"></i> ジョン・ルイス
                        </a>
                    </div>

            </label>
        </div>

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-4">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this,'card-4')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">⌚</span>
                        <span class="task-label font-bold text-slate-800">腕時計</span>
                        <span class="badge bg-slate-100 text-slate-500">予算が許せば</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">バッグチャームとあわせて検討して！</p>
                    <div class="link-row">
                        <a href="https://maps.app.goo.gl/mRBF28pzXVCH7fhX9" target="_blank" class="link-btn link-btn-map" onclick="event.stopPropagation()">
                            <i class="fa-solid fa-map-location-dot"></i> ジョン・ルイス
                        </a>
                    </div>
                </div>

        </div>
    </section>

    <!-- ======= ぴぴへ ======= -->
    <section class="fade-in">
        <div class="section-header"><span class="text-xl">👗</span><h2>ぴぴへ</h2></div>

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-5">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this,'card-5')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">

                    </div>
                    <div class="link-row">
                        <a href="https://www.johnlewis.com/john-lewis-kids-wavy-stripe-knit-dress-multi/p114464209" target="_blank" class="link-btn link-btn-shop" onclick="event.stopPropagation()">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i> 商品ページ
                        </a>
                        <a href="https://maps.app.goo.gl/mRBF28pzXVCH7fhX9" target="_blank" class="link-btn link-btn-map" onclick="event.stopPropagation()">
                            <i class="fa-solid fa-map-location-dot"></i> ジョン・ルイス

    <!-- ======= 紗英へ ======= -->

        <div class="task-card bg-white rounded-2xl shadow-sm p-4 mb-3" id="card-6">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="custom-checkbox mt-0.5" onchange="toggleTask(this,'card-6')">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="task-icon text-xl">🩵</span>
                        <span class="task-label font-bold text-slate-800">タイサイドTシャツ（アクア）</span>
                    </div>
                    <p class="task-label text-slate-500 text-sm mt-1">Mango Kids Textured Short Sleeve Tie Side T-Shirt・Aqua<br>紗英がギリ着てくれそうな女の子っぽいTシャツ</p>
                    <div class="price-tag">
                        <span>£19.99</span>
                        <span class="jpy">≈ ¥3,798</span>
                    </div>
                    <div class="link-row">
                        <a href="https://www.johnlewis.com/mango-kids-textured-short-sleeve-tie-side-t-shirt-aqua/p115117304" target="_blank" class="link-btn link-btn-shop" onclick="event.stopPropagation()">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i> 商品ページ
                        </a>
                        <a href="https://maps.app.goo.gl/mRBF28pzXVCH7fhX9" target="_blank" class="link-btn link-btn-map" onclick="event.stopPropagation()">

    <!-- ======= ついでにチェック ======= -->

                <div class="flex-1">

                    <div class="link-row">
                        <a href="https://www.autumnandmay.co.uk/product/fiorelli-layered-two-tone-octagon-sterling-silver-ring/" target="_blank" class="link-btn link-btn-shop" onclick="event.stopPropagation()">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i> 商品ページ
                        </a>
                    </div>
                </div>
            </label>
        </div>
    </section>

    <!-- 全完了メッセージ -->
    <div id="allDoneMsg" class="hidden text-center py-8">
        <div class="text-5xl mb-3">🎉</div>
        <p class="font-bold text-slate-700 text-lg">全部クリア！</p>
        <p class="text-slate-500 text-sm mt-1">お疲れさまでした。家族が喜ぶといいね！</p>
    </div>

</div>

<!-- 合計バー -->
<div id="totalBar" class="hidden-bar">
    <div>
        <p class="text-xs text-blue-200 mb-0.5">お買い物合計 <span class="text-blue-300">（£1 ≈ ¥190）</span></p>
        <p class="font-bold text-lg" id="totalGBP">£0.00</p>
    </div>
    <div class="text-right">
        <p class="text-xs text-blue-200 mb-0.5">日本円換算</p>
        <p class="font-bold text-lg" id="totalJPY">¥0</p>
    </div>
</div>

<script>
    const TOTAL = 8;
    const RATE = 190;

    // card-id → GBP価格（価格なしはnull）
    const PRICES = {
        'card-3': 170.00,   // VW バッグチャーム
        'card-5': 19.00,    // ニットワンピース（中央値）
        'card-6': 19.99,    // タイサイドTシャツ
    };

    function updateProgress() {
        const checked = document.querySelectorAll('.custom-checkbox:checked').length;
        const pct = Math.round((checked / TOTAL) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = checked + ' / ' + TOTAL + ' 完了';
        document.getElementById('progressPercent').textContent = pct + '%';
        document.getElementById('allDoneMsg').classList.toggle('hidden', checked < TOTAL);
    }

    function updateTotal() {
        let totalGBP = 0;
        document.querySelectorAll('.custom-checkbox:checked').forEach((cb, i) => {
            const cardId = cb.closest('[id^="card-"]').id;
            if (PRICES[cardId]) totalGBP += PRICES[cardId];
        });

        const bar = document.getElementById('totalBar');
        if (totalGBP > 0) {
            document.getElementById('totalGBP').textContent = '£' + totalGBP.toFixed(2);
            document.getElementById('totalJPY').textContent = '¥' + Math.round(totalGBP * RATE).toLocaleString();
            bar.classList.remove('hidden-bar');
        } else {
            bar.classList.add('hidden-bar');
        }
    }

    function toggleTask(checkbox, cardId) {
        const card = document.getElementById(cardId);
        if (checkbox.checked) {
            card.classList.add('task-done');
            card.style.opacity = '0.65';
        } else {
            card.classList.remove('task-done');
            card.style.opacity = '1';
        }
        updateProgress();
        updateTotal();
        saveState();
    }

    function saveState() {
        const states = {};
        document.querySelectorAll('.custom-checkbox').forEach((cb, i) => { states[i] = cb.checked; });
        try { localStorage.setItem('london_tasks', JSON.stringify(states)); } catch(e) {}
    }

    function loadState() {
        try {
            const states = JSON.parse(localStorage.getItem('london_tasks') || '{}');
            document.querySelectorAll('.custom-checkbox').forEach((cb, i) => {
                if (states[i]) {
                    cb.checked = true;
                    const card = document.getElementById('card-' + i);
                    if (card) { card.classList.add('task-done'); card.style.opacity = '0.65'; }
                }
            });
        } catch(e) {}
        updateProgress();
        updateTotal();
    }

    loadState();
</script>

</body>
